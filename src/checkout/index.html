<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <header class="divider" id="main-header">
    </header>

    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>
      </section>
    

    <form id="checkout-form">

    <input
    name="fname"
    required
    placeholder="First Name">
    <input
    name="lname"
    required
    placeholder="Last Name">
    <input
    name="street"
    required
    placeholder="Street Address">
    <input
    name="city"
    required
    placeholder="City">
    <input
    name="state"
    required
    placeholder="State">
    <input
    name="zip"
    required
    pattern="[0-9]{5}"
    maxlength="5"
    inputmode="tel"
    placeholder="Zip Code">
    <input
    name="cardNumber"
    required
    minlength="16"
    maxlength="16"
    inputmode="tel"
    placeholder="Card Number">
    <input
    name="expiration"
    required
    placeholder="MM/YY"
    pattern="(0[1-9]|1[0-2])\/[0-9]{2}">
    <input
    name="code"
    required
    minlength="3"
    maxlength="4"
    inputmode="tel"
    placeholder="CVV">

    <button type="submit">
    Checkout
    </button>

    </form>


    <section class="order-summary">

    <p>Subtotal:
    <span id="subtotal"></span>
    </p>

    <p>Tax:
    <span id="tax"></span>
    </p>

    <p>Shipping:
    <span id="shipping"></span>
    </p>

    <h3>Total:
    <span id="orderTotal"></span>
    </h3>

    </section>
    </main>

    <footer id="main-footer"></footer>
    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/checkout.js"></script>
  </body>
</html>
